name: Dyvix Quality check
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npx prettier --write . --ignore-path .gitignore
      - name: Suggest Changes
        uses: parkerbxyz/suggest-changes@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment: 'Prettier found some formatting issues! Click below to apply the fixes directly.'
