name: Dyvix Quality Check
on:
  pull_request_target:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Format
        run: npx prettier@latest --write . --ignore-path .gitignore
      - name: Check for formatting changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: parkerbxyz/suggest-changes@v3
        if: steps.diff.outputs.changed == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment: 'Prettier found some formatting issues! Click below to apply the fixes directly.'
          event: 'REQUEST_CHANGES'
      - name: Fail if formatting required
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "Formatting changes are required."
          exit 1
