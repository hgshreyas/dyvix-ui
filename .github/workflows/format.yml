name: Dyvix Quality check
on:
  pull_request:
    branches: [main]
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node install
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Format
        run: npm run format

      - name: Check for unformatted files
        run: git diff --exit-code
